<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes ringPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }
    @keyframes ringPulse2 {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }
    @keyframes glint {
      0%, 80%, 100% { opacity: 0; }
      40%            { opacity: 1; }
    }
    .r1 { animation: ringPulse  2.4s ease-in-out infinite; }
    .r2 { animation: ringPulse2 2.4s ease-in-out infinite 0.6s; }
    .g1 { animation: glint 2.4s ease-in-out infinite; }
    .g2 { animation: glint 2.4s ease-in-out infinite 0.6s; }
  </style>

  <!-- Ring 1 (gold) -->
  <circle cx="12" cy="16" r="7" fill="none" stroke="#C8A96E" stroke-width="2.6" class="r1"/>
  <!-- Ring 2 (teal) -->
  <circle cx="20" cy="16" r="7" fill="none" stroke="#14919B" stroke-width="2.6" class="r2"/>

  <!-- Glint dots -->
  <circle cx="7"  cy="11" r="1.2" fill="#E8D5A3" class="g1"/>
  <circle cx="25" cy="21" r="1.2" fill="#A8DADC" class="g2"/>
</svg>
